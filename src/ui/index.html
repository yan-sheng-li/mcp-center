<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Center - Server Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1923; color: #e0e6ed; padding: 20px; min-height: 100vh; }
    .container { max-width: 1600px; margin: 0 auto; background: linear-gradient(135deg, #1a2a3a 0%, #1e3345 100%); border: 1px solid #2a3a4a; border-radius: 8px; padding: 24px; }
    h1 { color: #fff; margin-bottom: 24px; font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .btn { padding: 7px 14px; border-radius: 4px; font-size: 13px; border: 1px solid #2a3a4a; background: #1a2a3a; color: #e0e6ed; cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: #4fc3f7; background: #243545; }
    .btn-primary { background: #1a2a3a; color: #4fc3f7; border-color: #2a3a4a; }
    .btn-primary:hover { background: #243545; border-color: #4fc3f7; }
    .btn-danger { background: #1a2a3a; color: #ef5350; border-color: #2a3a4a; }
    .btn-danger:hover { background: #243545; border-color: #ef5350; }
    .btn-success { background: #1a2a3a; color: #66bb6a; border-color: #2a3a4a; }
    .btn-success:hover { background: #243545; border-color: #66bb6a; }
    .btn-secondary { background: #1a2a3a; color: #8a9bb5; border-color: #2a3a4a; }
    .btn-secondary:hover { background: #243545; border-color: #8a9bb5; }
    .btn-info { background: #1a2a3a; color: #ab47bc; border-color: #2a3a4a; }
    .btn-info:hover { background: #243545; border-color: #ab47bc; }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 4px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toggle-wrap { display: flex; align-items: center; gap: 6px; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #2a3a4a; border-radius: 22px; transition: 0.2s; }
    .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #8a9bb5; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: #0288d1; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #fff; }
    .toggle input:disabled + .toggle-slider { opacity: 0.5; cursor: not-allowed; }
    .server-item.disabled-server { opacity: 0.55; }
    .server-list { margin-top: 20px; }
    .server-item { background: linear-gradient(135deg, #1a2a3a 0%, #1e3345 100%); border: 1px solid #2a3a4a; border-radius: 8px; padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
    .server-item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4fc3f7, #0288d1); }
    .server-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .server-name { font-weight: 600; font-size: 17px; color: #fff; }
    .server-type { display: inline-block; padding: 3px 7px; border-radius: 3px; font-size: 11px; margin-left: 8px; }
    .type-http { background: rgba(79, 195, 247, 0.15); color: #4fc3f7; }
    .type-stdio { background: rgba(102, 187, 106, 0.15); color: #66bb6a; }
    .type-wsbridge { background: rgba(171, 71, 188, 0.15); color: #ab47bc; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 11px; margin-left: 8px; }
    .status-connected { background: rgba(102, 187, 106, 0.15); color: #66bb6a; }
    .status-failed { background: rgba(239, 83, 80, 0.15); color: #ef5350; }
    .status-loading { background: rgba(255, 167, 38, 0.15); color: #ffa726; }
    .error-msg { font-size: 12px; color: #ef5350; margin-top: 4px; background: rgba(239, 83, 80, 0.15); padding: 4px 8px; border-radius: 3px; }
    .server-details { font-size: 13px; color: #8a9bb5; margin-top: 4px; }
    .caps-section { margin-top: 10px; border-top: 1px solid #2a3a4a; padding-top: 10px; }
    .caps-group { margin-bottom: 8px; }
    .caps-label { font-size: 12px; font-weight: 600; color: #8a9bb5; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .caps-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .cap-tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-family: monospace; }
    .cap-tool { background: rgba(79, 195, 247, 0.15); color: #4fc3f7; border: 1px solid rgba(79, 195, 247, 0.3); }
    .cap-resource { background: rgba(255, 167, 38, 0.15); color: #ffa726; border: 1px solid rgba(255, 167, 38, 0.3); }
    .cap-template { background: rgba(171, 71, 188, 0.15); color: #ab47bc; border: 1px solid rgba(171, 71, 188, 0.3); }
    .cap-prompt { background: rgba(102, 187, 106, 0.15); color: #66bb6a; border: 1px solid rgba(102, 187, 106, 0.3); }
    .cap-desc { font-size: 11px; color: #5a6b7d; margin-left: 4px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: #8a9bb5; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #2a3a4a; border-radius: 4px; font-size: 14px; background: #0f1923; color: #e0e6ed; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #4fc3f7; }
    textarea { min-height: 80px; font-family: monospace; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 25, 35, 0.9); z-index: 1000; }
    .modal-content { background: linear-gradient(135deg, #1a2a3a 0%, #1e3345 100%); border: 1px solid #2a3a4a; margin: 40px auto; padding: 28px; border-radius: 8px; max-width: 640px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close { font-size: 28px; cursor: pointer; color: #5a6b7d; line-height: 1; }
    .close:hover { color: #e0e6ed; }
    .type-fields { display: none; }
    .type-fields.active { display: block; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .probe-section { margin-top: 10px; padding: 12px; background: #0f1923; border-radius: 4px; border: 1px solid #2a3a4a; }
    .probe-section h4 { font-size: 13px; color: #8a9bb5; margin-bottom: 8px; }
    .probe-loading { color: #ffa726; font-size: 13px; }
    .probe-error { color: #ef5350; font-size: 13px; background: rgba(239, 83, 80, 0.15); padding: 6px 10px; border-radius: 3px; }
    .probe-group { margin-bottom: 10px; }
    .probe-group-label { font-size: 12px; font-weight: 600; color: #8a9bb5; text-transform: uppercase; margin-bottom: 5px; }
    .probe-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
    .probe-item input[type=checkbox] { width: auto; margin-top: 2px; flex-shrink: 0; }
    .probe-item-name { font-family: monospace; font-size: 13px; color: #e0e6ed; }
    .probe-item-desc { font-size: 12px; color: #5a6b7d; }
    .enabled-tools-row { display: flex; align-items: center; gap: 8px; }
    .enabled-tools-row input { flex: 1; }
    .profile-bar { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: linear-gradient(135deg, #1a2a3a 0%, #1e3345 100%); border: 1px solid #2a3a4a; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .profile-bar .label { font-size: 13px; font-weight: 600; color: #8a9bb5; margin-right: 4px; }
    .profile-bar select { width: auto; min-width: 160px; padding: 6px 10px; font-size: 13px; }
    .profile-bar .active-tag { display: inline-block; padding: 2px 10px; background: rgba(102, 187, 106, 0.15); color: #66bb6a; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .profile-bar .btn { padding: 6px 12px; font-size: 12px; }
    .profile-item { background: linear-gradient(135deg, #1a2a3a 0%, #1e3345 100%); border: 1px solid #2a3a4a; border-radius: 8px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
    .profile-item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4fc3f7, #0288d1); }
    .profile-item.active-profile { border-color: #66bb6a; }
    .profile-item.active-profile::before { background: linear-gradient(90deg, #66bb6a, #2e7d32); }
    .profile-item .profile-info { flex: 1; }
    .profile-item .profile-name { font-weight: 600; font-size: 15px; color: #fff; }
    .profile-item .profile-servers { font-size: 12px; color: #5a6b7d; margin-top: 3px; }
    .profile-item .profile-servers span { display: inline-block; padding: 1px 6px; background: rgba(79, 195, 247, 0.15); color: #4fc3f7; border-radius: 3px; margin: 2px 2px; font-size: 11px; }
    .profile-list { margin-top: 12px; }
    .profile-select-group { display: flex; align-items: center; gap: 6px; margin-bottom: 15px; }
    .profile-select-group label { font-size: 13px; font-weight: 600; color: #8a9bb5; margin-bottom: 0; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1923; }
    ::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4a5a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCP Center</h1>

    <!-- Profile Bar -->
    <div class="profile-bar" id="profileBar">
      <span class="label">Profile:</span>
      <select id="profileSelect" onchange="onProfileSelectChange()">
        <option value="">(None)</option>
      </select>
      <button class="btn btn-success" id="btnActivateProfile" onclick="activateSelectedProfile()" disabled>Activate</button>
      <button class="btn btn-secondary" id="btnDeactivateProfile" onclick="deactivateCurrentProfile()" style="display:none">Deactivate</button>
      <button class="btn btn-primary" onclick="openProfileModal()">+ New Profile</button>
      <button class="btn btn-info" onclick="openProfileManager()">Manage</button>
    </div>

    <div class="btn-group" style="margin-bottom:20px">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Server</button>
      <button class="btn btn-info" onclick="exportBackup()">Export Backup</button>
      <button type="button" class="btn btn-secondary" onclick="document.getElementById('backupFileInput').click()">Import Backup</button>
      <input type="file" id="backupFileInput" accept=".zip" style="display:none" onchange="importBackup(this)">
      <a href="/stats" class="btn btn-secondary" style="text-decoration:none;color:white">Stats Dashboard</a>
    </div>
    <div class="server-list" id="serverList"></div>
  </div>

  <!-- Profile Create/Edit Modal -->
  <div id="profileModal" class="modal">
    <div class="modal-content" style="max-width:560px">
      <div class="modal-header">
        <h2 id="profileModalTitle">Create Profile</h2>
        <span class="close" onclick="closeProfileModal()">&times;</span>
      </div>
      <form onsubmit="saveProfile(event)">
        <div class="form-group">
          <label>Profile Name *</label>
          <input type="text" id="profileName" required placeholder="e.g. Development, Writing">
        </div>
        <div class="form-group">
          <label>Servers to Include</label>
          <div id="profileServerCheckboxes" style="max-height:300px;overflow-y:auto;padding:8px;background:#0f1923;border:1px solid #2a3a4a;border-radius:4px"></div>
          <div style="font-size:11px;color:#5a6b7d;margin-top:4px">Select servers to include in this profile. Only selected servers will be enabled when the profile is activated.</div>
        </div>
        <div class="btn-group" style="margin-top:16px">
          <button type="submit" class="btn btn-success" id="profileSaveBtn">Save Profile</button>
          <button type="button" class="btn btn-secondary" onclick="closeProfileModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Profile Manager Modal -->
  <div id="profileManagerModal" class="modal">
    <div class="modal-content" style="max-width:600px">
      <div class="modal-header">
        <h2>Manage Profiles</h2>
        <span class="close" onclick="closeProfileManager()">&times;</span>
      </div>
      <div id="profileList" class="profile-list"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Server</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <form id="serverForm" onsubmit="saveServer(event)">
        <div class="form-group">
          <label>Server Name *</label>
          <input type="text" id="serverName" required>
        </div>
        <div class="form-group">
          <label>Server Type *</label>
          <select id="serverType" onchange="toggleTypeFields()" required>
            <option value="http">HTTP</option>
            <option value="stdio">STDIO</option>
          </select>
        </div>
        <div id="httpFields" class="type-fields active">
          <div class="form-group">
            <label>URL *</label>
            <input type="url" id="serverUrl">
          </div>
          <div class="form-group">
            <label>HTTP Headers (JSON)</label>
            <textarea id="serverHeaders" placeholder='{"Authorization": "Bearer token"}'></textarea>
          </div>
        </div>
        <div id="stdioFields" class="type-fields">
          <div class="form-group">
            <label>Command *</label>
            <input type="text" id="serverCommand">
          </div>
          <div class="form-group">
            <label>Arguments (JSON array)</label>
            <textarea id="serverArgs" placeholder='["arg1", "arg2"]'></textarea>
          </div>
          <div class="form-group">
            <label>Environment Variables (JSON)</label>
            <textarea id="serverEnv" placeholder='{"KEY": "value"}'></textarea>
          </div>
        </div>
        <div class="form-group">
          <label>Enabled Tools</label>
          <div class="enabled-tools-row">
            <input type="text" id="enabledTools" placeholder="Leave empty to enable all">
            <button type="button" class="btn btn-info" onclick="probeAndShowTools()">Query Tools</button>
          </div>
        </div>
        <div id="probeSection" style="display:none" class="probe-section">
          <div id="probeContent"></div>
        </div>
        <div class="btn-group" style="margin-top:16px">
          <button type="submit" class="btn btn-success" id="saveBtn">Save</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let editingIndex = -1;
    let listReloadTimer = null;
    let lastRenderedServersKey = '';
    let currentProfiles = [];
    let currentActiveProfile = null;
    let editingProfileName = null;
    let allServerNamesCache = [];

    async function loadServers() {
      const [serversRes, statusRes, wsBridgeRes] = await Promise.all([
        fetch('/api/servers'),
        fetch('/api/servers/status'),
        fetch('/api/wsbridge/servers').catch(() => ({ json: () => [] }))
      ]);
      const servers = await serversRes.json();
      const statusMap = await statusRes.json();
      const wsBridgeServers = await wsBridgeRes.json();
      const list = document.getElementById('serverList');
      const serversKey = JSON.stringify(servers) + '|' + JSON.stringify(wsBridgeServers);

      if (servers.length === 0 && wsBridgeServers.length === 0) {
        list.innerHTML = '<p style="color:#999;margin-top:20px">No servers configured. Click "+ Add Server" to get started.</p>';
        lastRenderedServersKey = '';
        return;
      }

      if (serversKey !== lastRenderedServersKey) {
        const configHtml = servers.map((s, i) => {
        const type = s.url ? 'http' : 'stdio';
        const maskObj = obj => JSON.stringify(Object.fromEntries(Object.keys(obj).map(k => [k, '******'])));
        const details = type === 'http'
          ? 'URL: ' + s.url + (s.httpHeaders && Object.keys(s.httpHeaders).length ? ' | Headers: ' + maskObj(s.httpHeaders) : '')
          : 'Command: ' + s.command + ' ' + (s.args || []).join(' ') + (s.env && Object.keys(s.env).length ? ' | Env: ' + maskObj(s.env) : '');
        const enabled = s.enabled !== false;
        const capsId = 'caps-' + i;
        return '<div class="server-item' + (enabled ? '' : ' disabled-server') + '" id="server-item-' + i + '">' +
          '<div class="server-header">' +
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
              '<span class="server-name">' + escHtml(s.name) + '</span>' +
              '<span class="server-type type-' + type + '">' + type.toUpperCase() + '</span>' +
              '<span id="status-' + i + '"></span>' +
            '</div>' +
            '<div class="btn-group" style="align-items:center">' +
              '<div class="toggle-wrap" title="' + (enabled ? 'Click to disable' : 'Click to enable') + '">' +
                '<label class="toggle"><input type="checkbox" id="toggle-' + i + '" ' + (enabled ? 'checked' : '') + ' onchange="toggleServer(' + i + ', this)"><span class="toggle-slider"></span></label>' +
              '</div>' +
              '<button class="btn btn-primary" id="edit-btn-' + i + '" onclick="editServer(' + i + ')">Edit</button>' +
              '<button class="btn btn-danger" id="delete-btn-' + i + '" onclick="deleteServer(' + i + ')">Delete</button>' +
            '</div>' +
          '</div>' +
          '<div class="server-details">' + escHtml(details) + '</div>' +
          (s.enabledTools ? '<div class="server-details">Enabled Tools: ' + escHtml(s.enabledTools.join(', ')) + '</div>' : '') +
          '<div id="error-' + i + '"></div>' +
          '<div class="caps-section" id="' + capsId + '" style="display:none"></div>' +
        '</div>';
        }).join('');

        // Render wsBridge servers (read-only, auto-registered)
        const wsBridgeHtml = wsBridgeServers.map((ws) => {
          const wsbId = 'wsb-caps-' + ws.name;
          return '<div class="server-item" id="wsbridge-item-' + ws.name + '">' +
            '<div class="server-header">' +
              '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
                '<span class="server-name">' + escHtml(ws.name) + '</span>' +
                '<span class="server-type type-wsbridge">WSBRIDGE</span>' +
                '<span id="wsbridge-status-' + ws.name + '"></span>' +
              '</div>' +
              '<div style="font-size:11px;color:#999">auto-registered · read-only</div>' +
            '</div>' +
            '<div class="server-details">WebSocket bridge — client connects at /ws/' + escHtml(ws.name) + '</div>' +
            '<div class="caps-section" id="' + wsbId + '" style="display:none"></div>' +
          '</div>';
        }).join('');

        list.innerHTML = configHtml + wsBridgeHtml;
        lastRenderedServersKey = serversKey;
      }

      const hasLoadingServers = updateServerStatuses(servers, statusMap);
      updateWsBridgeStatuses(wsBridgeServers);

      if (listReloadTimer) {
        clearTimeout(listReloadTimer);
        listReloadTimer = null;
      }
      if (hasLoadingServers) {
        listReloadTimer = setTimeout(() => {
          loadServers().catch(() => {});
        }, 1500);
      }

    }

    function updateServerStatuses(servers, statusMap) {
      let hasLoadingServers = false;

      servers.forEach((s, i) => {
        const enabled = s.enabled !== false;
        const st = statusMap[s.name];
        const itemEl = document.getElementById('server-item-' + i);
        const statusEl = document.getElementById('status-' + i);
        const errorEl = document.getElementById('error-' + i);
        const capsEl = document.getElementById('caps-' + i);
        if (!itemEl || !statusEl || !errorEl || !capsEl) return;

        itemEl.classList.toggle('disabled-server', !enabled);

        if (!enabled) {
          statusEl.innerHTML = '<span class="status-badge" style="background:#e2e3e5;color:#6c757d">disabled</span>';
          errorEl.innerHTML = '';
          capsEl.style.display = 'none';
          capsEl.innerHTML = '';
          return;
        }

        if (!st || st.status === 'loading') {
          hasLoadingServers = true;
          statusEl.innerHTML = '<span class="status-badge status-loading">loading...</span>';
          errorEl.innerHTML = '';
          capsEl.style.display = 'none';
          capsEl.innerHTML = '';
          return;
        }

        if (st.status === 'failed') {
          statusEl.innerHTML = '<span class="status-badge status-failed">failed</span>';
          errorEl.innerHTML = st.error
            ? '<div class="error-msg">Error: ' + escHtml(st.error) + '</div>'
            : '';
          capsEl.style.display = 'none';
          capsEl.innerHTML = '';
          return;
        }

        statusEl.innerHTML = '<span class="status-badge status-connected">connected</span>';
        errorEl.innerHTML = '';
        capsEl.style.display = 'block';
        if (!capsEl.dataset.loadedFor || capsEl.dataset.loadedFor !== s.name) {
          capsEl.dataset.loadedFor = s.name;
          capsEl.innerHTML = '<span style="font-size:12px;color:#999">Loading capabilities...</span>';
          loadCaps(s.name, 'caps-' + i);
        }
      });

      return hasLoadingServers;
    }

    function updateWsBridgeStatuses(wsList) {
      for (const ws of wsList) {
        const statusEl = document.getElementById('wsbridge-status-' + ws.name);
        const capsEl = document.getElementById('wsb-caps-' + ws.name);
        if (!statusEl || !capsEl) continue;

        statusEl.innerHTML = '<span class="status-badge status-connected">connected</span>';
        capsEl.style.display = 'block';
        if (!capsEl.dataset.loadedFor || capsEl.dataset.loadedFor !== ws.name) {
          capsEl.dataset.loadedFor = ws.name;
          capsEl.innerHTML = '<span style="font-size:12px;color:#999">Loading capabilities...</span>';
          loadCaps(ws.name, 'wsb-caps-' + ws.name);
        }
      }
    }

    function setButtonLoading(btn, loading, originalText) {
      if (loading) {
        btn.disabled = true;
        btn.dataset.originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span>' + originalText;
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.originalText || originalText;
      }
    }

    function resetSaveButton() {
      const saveBtn = document.getElementById('saveBtn');
      setButtonLoading(saveBtn, false, 'Save');
      saveBtn.disabled = false;
    }

    async function toggleServer(index, checkbox) {
      checkbox.disabled = true;
      try {
        const res = await fetch('/api/servers/' + index + '/toggle', { method: 'PATCH' });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          checkbox.checked = !checkbox.checked; // revert
        }
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        checkbox.checked = !checkbox.checked;
        checkbox.disabled = false;
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadCaps(serverName, elId) {
      const el = document.getElementById(elId);
      if (!el) return;
      try {
        const res = await fetch('/api/servers/' + encodeURIComponent(serverName) + '/capabilities');
        if (!res.ok) { el.innerHTML = ''; return; }
        const caps = await res.json();
        let html = '';
        if (caps.tools && caps.tools.length > 0) {
          html += '<div class="caps-group"><div class="caps-label">Tools (' + caps.tools.length + ')</div><div class="caps-list">' +
            caps.tools.map(t => '<span class="cap-tag cap-tool" title="' + escHtml(t.description) + '">' + escHtml(t.name) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.resources && caps.resources.length > 0) {
          html += '<div class="caps-group"><div class="caps-label">Resources (' + caps.resources.length + ')</div><div class="caps-list">' +
            caps.resources.map(r => '<span class="cap-tag cap-resource" title="' + escHtml(r.description) + '">' + escHtml(r.uri) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.resourceTemplates && caps.resourceTemplates.length > 0) {
          html += '<div class="caps-group"><div class="caps-label">Resource Templates (' + caps.resourceTemplates.length + ')</div><div class="caps-list">' +
            caps.resourceTemplates.map(r => '<span class="cap-tag cap-template" title="' + escHtml(r.description) + '">' + escHtml(r.uriTemplate) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.prompts && caps.prompts.length > 0) {
          html += '<div class="caps-group"><div class="caps-label">Prompts (' + caps.prompts.length + ')</div><div class="caps-list">' +
            caps.prompts.map(p => '<span class="cap-tag cap-prompt" title="' + escHtml(p.description) + '">' + escHtml(p.name) + '</span>').join('') +
          '</div></div>';
        }
        el.innerHTML = html || '<span style="font-size:12px;color:#999">No capabilities found</span>';
      } catch(e) {
        el.innerHTML = '';
      }
    }

    function buildProbeConfig() {
      const type = document.getElementById('serverType').value;
      const cfg = { name: '__probe__' };
      if (type === 'http') {
        cfg.url = document.getElementById('serverUrl').value;
        const h = document.getElementById('serverHeaders').value.trim();
        if (h) { try { cfg.httpHeaders = JSON.parse(h); } catch(_) {} }
      } else {
        cfg.command = document.getElementById('serverCommand').value;
        const a = document.getElementById('serverArgs').value.trim();
        if (a) { try { cfg.args = JSON.parse(a); } catch(_) {} }
        const e = document.getElementById('serverEnv').value.trim();
        if (e) { try { cfg.env = JSON.parse(e); } catch(_) {} }
      }
      return cfg;
    }

    async function probeAndShowTools() {
      const sec = document.getElementById('probeSection');
      const content = document.getElementById('probeContent');
      sec.style.display = 'block';

      const cfg = buildProbeConfig();
      content.innerHTML = '<div class="probe-loading">Connecting to server...</div>';
      try {
        const res = await fetch('/api/probe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        });
        const data = await res.json();
        if (!res.ok) {
          content.innerHTML = '<div class="probe-error">Error: ' + escHtml(data.error || 'Unknown error') + '</div>';
          return;
        }
        renderProbeResults(data);
      } catch(e) {
        content.innerHTML = '<div class="probe-error">Error: ' + escHtml(e.message) + '</div>';
      }
    }

    function renderProbeResults(data) {
      const content = document.getElementById('probeContent');
      let html = '<h4>Select capabilities to enable (all checked by default):</h4>';

      if (data.tools && data.tools.length > 0) {
        html += '<div class="probe-group"><div class="probe-group-label">Tools (' + data.tools.length + ')</div>';
        data.tools.forEach(t => {
          html += '<div class="probe-item">' +
            '<input type="checkbox" class="probe-tool-cb" value="' + escHtml(t.name) + '" checked>' +
            '<div><div class="probe-item-name">' + escHtml(t.name) + '</div>' +
            (t.description ? '<div class="probe-item-desc">' + escHtml(t.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.resources && data.resources.length > 0) {
        html += '<div class="probe-group"><div class="probe-group-label">Resources (' + data.resources.length + ')</div>';
        data.resources.forEach(r => {
          html += '<div class="probe-item">' +
            '<input type="checkbox" class="probe-resource-cb" value="' + escHtml(r.uri) + '" checked>' +
            '<div><div class="probe-item-name">' + escHtml(r.uri) + '</div>' +
            (r.description ? '<div class="probe-item-desc">' + escHtml(r.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.resourceTemplates && data.resourceTemplates.length > 0) {
        html += '<div class="probe-group"><div class="probe-group-label">Resource Templates (' + data.resourceTemplates.length + ')</div>';
        data.resourceTemplates.forEach(r => {
          html += '<div class="probe-item">' +
            '<input type="checkbox" class="probe-template-cb" value="' + escHtml(r.uriTemplate) + '" checked>' +
            '<div><div class="probe-item-name">' + escHtml(r.uriTemplate) + '</div>' +
            (r.description ? '<div class="probe-item-desc">' + escHtml(r.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.prompts && data.prompts.length > 0) {
        html += '<div class="probe-group"><div class="probe-group-label">Prompts (' + data.prompts.length + ')</div>';
        data.prompts.forEach(p => {
          html += '<div class="probe-item">' +
            '<input type="checkbox" class="probe-prompt-cb" value="' + escHtml(p.name) + '" checked>' +
            '<div><div class="probe-item-name">' + escHtml(p.name) + '</div>' +
            (p.description ? '<div class="probe-item-desc">' + escHtml(p.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (!data.tools?.length && !data.resources?.length && !data.resourceTemplates?.length && !data.prompts?.length) {
        html += '<div style="color:#999;font-size:13px">No capabilities found on this server.</div>';
      }

      content.innerHTML = html;

      // Sync tool checkboxes -> enabledTools input
      content.querySelectorAll('.probe-tool-cb').forEach(cb => {
        cb.addEventListener('change', syncEnabledTools);
      });
      syncEnabledTools();
    }

    function syncEnabledTools() {
      const cbs = document.querySelectorAll('.probe-tool-cb');
      if (!cbs.length) return;
      const all = Array.from(cbs);
      const checked = all.filter(c => c.checked).map(c => c.value);
      // If all checked, leave empty (means "all enabled")
      document.getElementById('enabledTools').value = checked.length === all.length ? '' : checked.join(', ');
    }

    function openAddModal() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = 'Add Server';
      document.getElementById('serverForm').reset();
      document.getElementById('probeSection').style.display = 'none';
      document.getElementById('probeContent').innerHTML = '';
      resetSaveButton();
      document.getElementById('modal').style.display = 'block';
      toggleTypeFields();
    }

    async function editServer(index) {
      const res = await fetch('/api/servers');
      const servers = await res.json();
      const server = servers[index];
      editingIndex = index;

      document.getElementById('modalTitle').textContent = 'Edit Server';
      document.getElementById('serverName').value = server.name;
      document.getElementById('serverType').value = server.url ? 'http' : 'stdio';

      if (server.url) {
        document.getElementById('serverUrl').value = server.url;
        document.getElementById('serverHeaders').value = server.httpHeaders ? JSON.stringify(server.httpHeaders, null, 2) : '';
      } else {
        document.getElementById('serverCommand').value = server.command || '';
        document.getElementById('serverArgs').value = server.args ? JSON.stringify(server.args) : '';
        document.getElementById('serverEnv').value = server.env ? JSON.stringify(server.env, null, 2) : '';
      }

      document.getElementById('enabledTools').value = server.enabledTools ? server.enabledTools.join(', ') : '';
      document.getElementById('probeSection').style.display = 'none';
      document.getElementById('probeContent').innerHTML = '';
      resetSaveButton();
      document.getElementById('modal').style.display = 'block';
      toggleTypeFields();
    }

    async function deleteServer(index) {
      if (!confirm('Are you sure you want to delete this server?')) return;
      const btn = document.getElementById('delete-btn-' + index);
      setButtonLoading(btn, true, 'Deleting...');
      try {
        const res = await fetch('/api/servers/' + index, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          setButtonLoading(btn, false, 'Delete');
          return;
        }
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        setButtonLoading(btn, false, 'Delete');
      }
    }

    async function saveServer(e) {
      e.preventDefault();
      const name = document.getElementById('serverName').value;
      const type = document.getElementById('serverType').value;
      const enabledTools = document.getElementById('enabledTools').value
        .split(',').map(t => t.trim()).filter(t => t);

      const server = { name };
      if (enabledTools.length > 0) server.enabledTools = enabledTools;

      // Collect enabled resources/templates/prompts from probe checkboxes if visible
      const resourceCbs = document.querySelectorAll('.probe-resource-cb');
      if (resourceCbs.length) {
        const all = Array.from(resourceCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledResources = checked;
      }
      const templateCbs = document.querySelectorAll('.probe-template-cb');
      if (templateCbs.length) {
        const all = Array.from(templateCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledResourceTemplates = checked;
      }
      const promptCbs = document.querySelectorAll('.probe-prompt-cb');
      if (promptCbs.length) {
        const all = Array.from(promptCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledPrompts = checked;
      }

      if (type === 'http') {
        server.url = document.getElementById('serverUrl').value;
        const headers = document.getElementById('serverHeaders').value.trim();
        if (headers) {
          try { server.httpHeaders = JSON.parse(headers); }
          catch(_) { alert('Invalid JSON for HTTP headers'); return; }
        }
      } else {
        server.command = document.getElementById('serverCommand').value;
        const args = document.getElementById('serverArgs').value.trim();
        if (args) {
          try { server.args = JSON.parse(args); }
          catch(_) { alert('Invalid JSON for arguments'); return; }
        }
        const env = document.getElementById('serverEnv').value.trim();
        if (env) {
          try { server.env = JSON.parse(env); }
          catch(_) { alert('Invalid JSON for environment variables'); return; }
        }
      }

      const method = editingIndex >= 0 ? 'PUT' : 'POST';
      const url = editingIndex >= 0 ? '/api/servers/' + editingIndex : '/api/servers';

      const saveBtn = document.getElementById('saveBtn');
      setButtonLoading(saveBtn, true, 'Saving...');
      saveBtn.disabled = true;

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(server)
        });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          resetSaveButton();
          return;
        }
        resetSaveButton();
        closeModal();
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        resetSaveButton();
      }
    }

    function closeModal() {
      resetSaveButton();
      document.getElementById('modal').style.display = 'none';
    }

    function toggleTypeFields() {
      const type = document.getElementById('serverType').value;
      document.getElementById('httpFields').classList.toggle('active', type === 'http');
      document.getElementById('stdioFields').classList.toggle('active', type === 'stdio');
    }

    // ===== Profile Functions =====

    async function loadProfiles() {
      try {
        const res = await fetch('/api/profiles');
        const data = await res.json();
        currentProfiles = data.profiles || [];
        currentActiveProfile = data.active;
        renderProfileBar();
      } catch(e) {
        console.error('Failed to load profiles:', e);
      }
    }

    function renderProfileBar() {
      const sel = document.getElementById('profileSelect');
      const curVal = sel.value;
      sel.innerHTML = '<option value="">(None)</option>';
      currentProfiles.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name + ' (' + p.servers.length + ' servers)';
        if (p.name === currentActiveProfile) opt.selected = true;
        sel.appendChild(opt);
      });

      // Show/hide activate/deactivate buttons
      const btnActivate = document.getElementById('btnActivateProfile');
      const btnDeactivate = document.getElementById('btnDeactivateProfile');
      btnActivate.disabled = !sel.value || sel.value === currentActiveProfile;
      btnDeactivate.style.display = currentActiveProfile ? 'inline-block' : 'none';
    }

    function onProfileSelectChange() {
      const sel = document.getElementById('profileSelect');
      document.getElementById('btnActivateProfile').disabled = !sel.value || sel.value === currentActiveProfile;
    }

    async function activateSelectedProfile() {
      const name = document.getElementById('profileSelect').value;
      if (!name) return;
      try {
        const res = await fetch('/api/profiles/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
        currentActiveProfile = name;
        renderProfileBar();
        loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    async function deactivateCurrentProfile() {
      try {
        const res = await fetch('/api/profiles/deactivate', { method: 'POST' });
        if (!res.ok) { const data = await res.json(); alert('Error: ' + (data.error || '')); return; }
        currentActiveProfile = null;
        renderProfileBar();
        loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    async function openProfileModal(editName) {
      editingProfileName = editName || null;
      document.getElementById('profileModalTitle').textContent = editName ? 'Edit Profile' : 'Create Profile';
      document.getElementById('profileName').value = editName || '';

      // Fetch servers for checkboxes
      const serversRes = await fetch('/api/servers');
      const servers = await serversRes.json();
      allServerNamesCache = servers.map(s => s.name);

      // Get current servers if editing
      let checkedServers = [];
      if (editName) {
        const profile = currentProfiles.find(p => p.name === editName);
        if (profile) checkedServers = profile.servers;
      }

      const container = document.getElementById('profileServerCheckboxes');
      if (servers.length === 0) {
        container.innerHTML = '<div style="color:#999;font-size:13px;padding:8px">No servers configured. Add servers first.</div>';
      } else {
        container.innerHTML = servers.map(s => {
          const checked = checkedServers.includes(s.name) ? 'checked' : '';
          const enabled = s.enabled !== false;
          return '<div class="probe-item" style="padding:6px 0">' +
            '<input type="checkbox" class="profile-srv-cb" value="' + escHtml(s.name) + '" ' + checked + ' style="width:auto">' +
            '<div><div class="probe-item-name">' + escHtml(s.name) + '</div>' +
            '<div class="probe-item-desc">' + (enabled ? '' : '<span style="color:#dc3545">disabled</span> · ') + (s.url ? 'HTTP' : 'STDIO') + '</div></div></div>';
        }).join('');
      }

      document.getElementById('profileModal').style.display = 'block';
    }

    function closeProfileModal() {
      document.getElementById('profileModal').style.display = 'none';
    }

    async function saveProfile(e) {
      e.preventDefault();
      const name = document.getElementById('profileName').value.trim();
      if (!name) { alert('Profile name is required'); return; }

      const checkedServers = Array.from(document.querySelectorAll('.profile-srv-cb:checked')).map(cb => cb.value);

      if (editingProfileName) {
        // Update existing
        try {
          const res = await fetch('/api/profiles/' + encodeURIComponent(editingProfileName), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, servers: checkedServers })
          });
          const data = await res.json();
          if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
          closeProfileModal();
          await loadProfiles();
          if (document.getElementById('profileManagerModal').style.display === 'block') {
            renderProfileManager();
          }
        } catch(e) { alert('Error: ' + e.message); }
      } else {
        // Create new
        try {
          const res = await fetch('/api/profiles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, servers: checkedServers })
          });
          const data = await res.json();
          if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
          closeProfileModal();
          await loadProfiles();
        } catch(e) { alert('Error: ' + e.message); }
      }
    }

    async function openProfileManager() {
      document.getElementById('profileManagerModal').style.display = 'block';
      renderProfileManager();
    }

    function closeProfileManager() {
      document.getElementById('profileManagerModal').style.display = 'none';
    }

    function renderProfileManager() {
      const container = document.getElementById('profileList');
      if (currentProfiles.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#999;padding:30px">No profiles created yet. Click "+ New Profile" to create one.</div>';
        return;
      }

      container.innerHTML = currentProfiles.map(p => {
        const isActive = p.name === currentActiveProfile;
        const escaped = escHtml(p.name);
        return '<div class="profile-item' + (isActive ? ' active-profile' : '') + '" data-profile="' + escaped + '">' +
          '<div class="profile-info">' +
            '<div class="profile-name">' + escaped + (isActive ? ' <span class="active-tag">ACTIVE</span>' : '') + '</div>' +
            '<div class="profile-servers">' + (p.servers.length > 0 ? p.servers.map(s => '<span>' + escHtml(s) + '</span>').join('') : '<span style="color:#dc3545">No servers</span>') + '</div>' +
          '</div>' +
          '<div class="btn-group">' +
            (!isActive ? '<button class="btn btn-success" data-action="activate" style="padding:4px 10px;font-size:11px">Activate</button>' : '') +
            '<button class="btn btn-primary" data-action="edit" style="padding:4px 10px;font-size:11px">Edit</button>' +
            '<button class="btn btn-danger" data-action="delete" style="padding:4px 10px;font-size:11px">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('');

      // Wire up event delegation for profile manager buttons
      container.querySelectorAll('.btn-group').forEach(group => {
        group.addEventListener('click', (e) => {
          const btn = e.target.closest('button');
          if (!btn || !btn.dataset.action) return;
          const item = btn.closest('.profile-item');
          if (!item) return;
          const name = item.dataset.profile;
          if (btn.dataset.action === 'activate') activateProfileFromManager(name);
          else if (btn.dataset.action === 'edit') editProfileFromManager(name);
          else if (btn.dataset.action === 'delete') deleteProfileFromManager(name);
        });
      });
    }

    function escAttr(str) {
      return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    async function activateProfileFromManager(name) {
      try {
        const res = await fetch('/api/profiles/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!res.ok) { alert('Error: ' + (data.error || '')); return; }
        currentActiveProfile = name;
        renderProfileBar();
        renderProfileManager();
        loadServers();
      } catch(e) { alert('Error: ' + e.message); }
    }

    function editProfileFromManager(name) {
      closeProfileManager();
      openProfileModal(name);
    }

    async function deleteProfileFromManager(name) {
      if (!confirm('Delete profile "' + name + '"?')) return;
      try {
        const res = await fetch('/api/profiles/' + encodeURIComponent(name), { method: 'DELETE' });
        if (!res.ok) { const data = await res.json(); alert('Error: ' + (data.error || '')); return; }
        await loadProfiles();
        renderProfileManager();
      } catch(e) { alert('Error: ' + e.message); }
    }

    // ===== Init =====
    loadProfiles();
    loadServers();

    // ===== Backup Functions =====

    function exportBackup() {
      window.location.href = '/api/backup/export';
    }

    async function importBackup(input) {
      const file = input.files[0];
      if (!file) return;

      if (!confirm('Importing a backup will OVERWRITE your current config and stats data. Are you sure?')) {
        input.value = '';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/api/backup/import', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) {
          alert('Import failed: ' + (data.error || 'Unknown error'));
          input.value = '';
          return;
        }
        const parts = [];
        if (data.config) parts.push('config');
        if (data.stats) parts.push('stats database');
        alert('Backup imported successfully! Restored: ' + parts.join(', ') + '. Page will reload.');
        window.location.reload();
      } catch(e) {
        alert('Import failed: ' + e.message);
      }
      input.value = '';
    }
  </script>
