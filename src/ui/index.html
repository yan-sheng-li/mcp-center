<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Center - Server Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1923; }
    ::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4a5a; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 p-5 min-h-screen font-sans">
  <div class="max-w-[1600px] mx-auto bg-slate-800 border border-slate-700 rounded-lg p-6">

    <h1 class="text-white text-2xl font-semibold flex items-center gap-2.5 mb-6">MCP Center</h1>

    <!-- Profile Bar -->
    <div class="flex items-center gap-2.5 p-3.5 bg-slate-800 border border-slate-700 rounded-lg mb-5 flex-wrap" id="profileBar">
      <span class="text-xs font-semibold text-slate-400 mr-1">Profile:</span>
      <select id="profileSelect" onchange="onProfileSelectChange()" class="w-auto min-w-[160px] px-2.5 py-1.5 text-xs bg-slate-900 border border-slate-700 rounded text-slate-200 focus:border-cyan-400 focus:outline-none">
        <option value="">(None)</option>
      </select>
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-green-400 border-slate-700 hover:bg-slate-700 hover:border-green-400 disabled:opacity-65 disabled:cursor-not-allowed" id="btnActivateProfile" onclick="activateSelectedProfile()" disabled>Activate</button>
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:border-slate-400 hidden" id="btnDeactivateProfile" onclick="deactivateCurrentProfile()">Deactivate</button>
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-cyan-400 border-slate-700 hover:bg-slate-700 hover:border-cyan-400" onclick="openProfileModal()">+ New Profile</button>
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-purple-400 border-slate-700 hover:bg-slate-700 hover:border-purple-400" onclick="openProfileManager()">Manage</button>
    </div>

    <div class="flex gap-2 flex-wrap mb-5">
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-cyan-400 border-slate-700 hover:bg-slate-700 hover:border-cyan-400" onclick="openAddModal()">+ Add Server</button>
      <button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-purple-400 border-slate-700 hover:bg-slate-700 hover:border-purple-400" onclick="exportBackup()">Export Backup</button>
      <button type="button" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:border-slate-400" onclick="document.getElementById('backupFileInput').click()">Import Backup</button>
      <input type="file" id="backupFileInput" accept=".zip" class="hidden" onchange="importBackup(this)">
      <a href="/stats" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-slate-200 border-slate-700 hover:bg-slate-700 hover:border-slate-400 no-underline">Stats Dashboard</a>
    </div>
    <div class="mt-5" id="serverList"></div>
  </div>

  <!-- Profile Create/Edit Modal -->
  <div id="profileModal" class="hidden fixed inset-0 bg-slate-900/90 z-50">
    <div class="bg-slate-800 border border-slate-700 mx-auto mt-10 p-7 rounded-lg max-w-[560px] max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-5">
        <h2 id="profileModalTitle" class="text-white text-lg font-semibold">Create Profile</h2>
        <span class="text-2xl cursor-pointer text-slate-500 leading-none hover:text-slate-200" onclick="closeProfileModal()">&times;</span>
      </div>
      <form onsubmit="saveProfile(event)">
        <div class="mb-3.5">
          <label class="block mb-1 font-medium text-slate-400 text-sm">Profile Name *</label>
          <input type="text" id="profileName" required placeholder="e.g. Development, Writing" class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
        </div>
        <div class="mb-3.5">
          <label class="block mb-1 font-medium text-slate-400 text-sm">Servers to Include</label>
          <div id="profileServerCheckboxes" class="max-h-[300px] overflow-y-auto p-2 bg-slate-900 border border-slate-700 rounded"></div>
          <div class="text-[11px] text-slate-500 mt-1">Select servers to include in this profile. Only selected servers will be enabled when the profile is activated.</div>
        </div>
        <div class="flex gap-2 flex-wrap mt-4">
          <button type="submit" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-green-400 border-slate-700 hover:bg-slate-700 hover:border-green-400" id="profileSaveBtn">Save Profile</button>
          <button type="button" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:border-slate-400" onclick="closeProfileModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Profile Manager Modal -->
  <div id="profileManagerModal" class="hidden fixed inset-0 bg-slate-900/90 z-50">
    <div class="bg-slate-800 border border-slate-700 mx-auto mt-10 p-7 rounded-lg max-w-[600px] max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-white text-lg font-semibold">Manage Profiles</h2>
        <span class="text-2xl cursor-pointer text-slate-500 leading-none hover:text-slate-200" onclick="closeProfileManager()">&times;</span>
      </div>
      <div id="profileList" class="mt-3"></div>
    </div>
  </div>

  <!-- Server Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/90 z-50">
    <div class="bg-slate-800 border border-slate-700 mx-auto mt-10 p-7 rounded-lg max-w-[640px] max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-5">
        <h2 id="modalTitle" class="text-white text-lg font-semibold">Add Server</h2>
        <span class="text-2xl cursor-pointer text-slate-500 leading-none hover:text-slate-200" onclick="closeModal()">&times;</span>
      </div>
      <form id="serverForm" onsubmit="saveServer(event)">
        <div class="mb-3.5">
          <label class="block mb-1 font-medium text-slate-400 text-sm">Server Name *</label>
          <input type="text" id="serverName" required class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
        </div>
        <div class="mb-3.5">
          <label class="block mb-1 font-medium text-slate-400 text-sm">Server Type *</label>
          <select id="serverType" onchange="toggleTypeFields()" required class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
            <option value="http">HTTP</option>
            <option value="stdio">STDIO</option>
          </select>
        </div>
        <div id="httpFields" class="hidden">
          <div class="mb-3.5">
            <label class="block mb-1 font-medium text-slate-400 text-sm">URL *</label>
            <input type="url" id="serverUrl" class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
          </div>
          <div class="mb-3.5">
            <label class="block mb-1 font-medium text-slate-400 text-sm">HTTP Headers (JSON)</label>
            <textarea id="serverHeaders" placeholder='{"Authorization": "Bearer token"}' class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none min-h-[80px] font-mono"></textarea>
          </div>
        </div>
        <div id="stdioFields" class="hidden">
          <div class="mb-3.5">
            <label class="block mb-1 font-medium text-slate-400 text-sm">Command *</label>
            <input type="text" id="serverCommand" class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
          </div>
          <div class="mb-3.5">
            <label class="block mb-1 font-medium text-slate-400 text-sm">Arguments (JSON array)</label>
            <textarea id="serverArgs" placeholder='["arg1", "arg2"]' class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none min-h-[80px] font-mono"></textarea>
          </div>
          <div class="mb-3.5">
            <label class="block mb-1 font-medium text-slate-400 text-sm">Environment Variables (JSON)</label>
            <textarea id="serverEnv" placeholder='{"KEY": "value"}' class="w-full px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none min-h-[80px] font-mono"></textarea>
          </div>
        </div>
        <div class="mb-3.5">
          <label class="block mb-1 font-medium text-slate-400 text-sm">Enabled Tools</label>
          <div class="flex items-center gap-2">
            <input type="text" id="enabledTools" placeholder="Leave empty to enable all" class="flex-1 px-2 py-2 border border-slate-700 rounded text-sm bg-slate-900 text-slate-200 focus:border-cyan-400 focus:outline-none">
            <button type="button" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-purple-400 border-slate-700 hover:bg-slate-700 hover:border-purple-400" onclick="probeAndShowTools()">Query Tools</button>
          </div>
        </div>
        <div id="probeSection" class="hidden mt-2.5 p-3 bg-slate-900 rounded border border-slate-700">
          <div id="probeContent"></div>
        </div>
        <div class="flex gap-2 flex-wrap mt-4">
          <button type="submit" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-green-400 border-slate-700 hover:bg-slate-700 hover:border-green-400" id="saveBtn">Save</button>
          <button type="button" class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:border-slate-400" id="cancelBtn" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let editingIndex = -1;
    let listReloadTimer = null;
    let lastRenderedServersKey = '';
    let currentProfiles = [];
    let currentActiveProfile = null;
    let editingProfileName = null;
    let allServerNamesCache = [];

    async function loadServers() {
      const [serversRes, statusRes, wsBridgeRes] = await Promise.all([
        fetch('/api/servers'),
        fetch('/api/servers/status'),
        fetch('/api/wsbridge/servers').catch(() => ({ json: () => [] }))
      ]);
      const servers = await serversRes.json();
      const statusMap = await statusRes.json();
      const wsBridgeServers = await wsBridgeRes.json();
      const list = document.getElementById('serverList');
      const serversKey = JSON.stringify(servers) + '|' + JSON.stringify(wsBridgeServers);

      if (servers.length === 0 && wsBridgeServers.length === 0) {
        list.innerHTML = '<p class="text-slate-400 mt-5">No servers configured. Click "+ Add Server" to get started.</p>';
        lastRenderedServersKey = '';
        return;
      }

      if (serversKey !== lastRenderedServersKey) {
        const configHtml = servers.map((s, i) => {
        const type = s.url ? 'http' : 'stdio';
        const maskObj = obj => JSON.stringify(Object.fromEntries(Object.keys(obj).map(k => [k, '******'])));
        const details = type === 'http'
          ? 'URL: ' + s.url + (s.httpHeaders && Object.keys(s.httpHeaders).length ? ' | Headers: ' + maskObj(s.httpHeaders) : '')
          : 'Command: ' + s.command + ' ' + (s.args || []).join(' ') + (s.env && Object.keys(s.env).length ? ' | Env: ' + maskObj(s.env) : '');
        const enabled = s.enabled !== false;
        const capsId = 'caps-' + i;
        return '<div class="bg-slate-800 border border-slate-700 rounded-lg p-5 mb-4 relative overflow-hidden' + (enabled ? '' : ' opacity-55') + '" id="server-item-' + i + '">' +
          '<div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#4fc3f7,#0288d1)"></div>' +
          '<div class="flex justify-between items-center mb-2">' +
            '<div class="flex items-center gap-1.5 flex-wrap">' +
              '<span class="font-semibold text-[17px] text-white">' + escHtml(s.name) + '</span>' +
              '<span class="inline-block px-1.5 py-0.5 rounded text-[11px] ml-2 ' + (type === 'http' ? 'bg-cyan-900/30 text-cyan-400' : 'bg-green-900/30 text-green-400') + '">' + type.toUpperCase() + '</span>' +
              '<span id="status-' + i + '"></span>' +
            '</div>' +
            '<div class="flex gap-2 flex-wrap items-center">' +
              '<div class="flex items-center gap-1.5" title="' + (enabled ? 'Click to disable' : 'Click to enable') + '">' +
                '<label class="relative inline-block w-10 h-[22px] shrink-0 cursor-pointer">' +
                  '<input type="checkbox" id="toggle-' + i + '" ' + (enabled ? 'checked' : '') + ' onchange="toggleServer(' + i + ', this)" class="peer sr-only">' +
                  '<span class="absolute inset-0 bg-slate-700 rounded-full transition-colors peer-checked:bg-cyan-700"></span>' +
                  '<span class="absolute top-[3px] left-[3px] w-4 h-4 bg-slate-400 rounded-full transition-all peer-checked:translate-x-[18px] peer-checked:bg-white"></span>' +
                '</label>' +
              '</div>' +
              '<button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-cyan-400 border-slate-700 hover:bg-slate-700 hover:border-cyan-400" id="edit-btn-' + i + '" onclick="editServer(' + i + ')">Edit</button>' +
              '<button class="px-3 py-1.5 rounded text-xs border cursor-pointer transition-colors bg-slate-800 text-red-400 border-slate-700 hover:bg-slate-700 hover:border-red-400" id="delete-btn-' + i + '" onclick="deleteServer(' + i + ')">Delete</button>' +
            '</div>' +
          '</div>' +
          '<div class="text-xs text-slate-400 mt-1">' + escHtml(details) + '</div>' +
          (s.enabledTools ? '<div class="text-xs text-slate-400 mt-1">Enabled Tools: ' + escHtml(s.enabledTools.join(', ')) + '</div>' : '') +
          '<div id="error-' + i + '"></div>' +
          '<div class="mt-2.5 border-t border-slate-700 pt-2.5 hidden" id="' + capsId + '"></div>' +
        '</div>';
        }).join('');

        // Render wsBridge servers (read-only, auto-registered)
        const wsBridgeHtml = wsBridgeServers.map((ws) => {
          const wsbId = 'wsb-caps-' + ws.name;
          return '<div class="bg-slate-800 border border-slate-700 rounded-lg p-5 mb-4 relative overflow-hidden" id="wsbridge-item-' + ws.name + '">' +
            '<div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#4fc3f7,#0288d1)"></div>' +
            '<div class="flex justify-between items-center mb-2">' +
              '<div class="flex items-center gap-1.5 flex-wrap">' +
                '<span class="font-semibold text-[17px] text-white">' + escHtml(ws.name) + '</span>' +
                '<span class="inline-block px-1.5 py-0.5 rounded text-[11px] ml-2 bg-purple-900/30 text-purple-400">WSBRIDGE</span>' +
                '<span id="wsbridge-status-' + ws.name + '"></span>' +
              '</div>' +
              '<div class="text-[11px] text-slate-500">auto-registered · read-only</div>' +
            '</div>' +
            '<div class="text-xs text-slate-400 mt-1">WebSocket bridge — client connects at /ws/' + escHtml(ws.name) + '</div>' +
            '<div class="mt-2.5 border-t border-slate-700 pt-2.5 hidden" id="' + wsbId + '"></div>' +
          '</div>';
        }).join('');

        list.innerHTML = configHtml + wsBridgeHtml;
        lastRenderedServersKey = serversKey;
      }

      const hasLoadingServers = updateServerStatuses(servers, statusMap);
      updateWsBridgeStatuses(wsBridgeServers);

      if (listReloadTimer) {
        clearTimeout(listReloadTimer);
        listReloadTimer = null;
      }
      if (hasLoadingServers) {
        listReloadTimer = setTimeout(() => {
          loadServers().catch(() => {});
        }, 1500);
      }

    }

    function updateServerStatuses(servers, statusMap) {
      let hasLoadingServers = false;

      servers.forEach((s, i) => {
        const enabled = s.enabled !== false;
        const st = statusMap[s.name];
        const itemEl = document.getElementById('server-item-' + i);
        const statusEl = document.getElementById('status-' + i);
        const errorEl = document.getElementById('error-' + i);
        const capsEl = document.getElementById('caps-' + i);
        if (!itemEl || !statusEl || !errorEl || !capsEl) return;

        itemEl.classList.toggle('opacity-55', !enabled);

        if (!enabled) {
          statusEl.innerHTML = '<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-slate-600 text-slate-500">disabled</span>';
          errorEl.innerHTML = '';
          capsEl.classList.add('hidden');
          capsEl.innerHTML = '';
          return;
        }

        if (!st || st.status === 'loading') {
          hasLoadingServers = true;
          statusEl.innerHTML = '<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-amber-900/30 text-amber-400">loading...</span>';
          errorEl.innerHTML = '';
          capsEl.classList.add('hidden');
          capsEl.innerHTML = '';
          return;
        }

        if (st.status === 'failed') {
          statusEl.innerHTML = '<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-red-900/30 text-red-400">failed</span>';
          errorEl.innerHTML = st.error
            ? '<div class="text-xs text-red-400 mt-1 bg-red-900/30 px-2 py-1 rounded">Error: ' + escHtml(st.error) + '</div>'
            : '';
          capsEl.classList.add('hidden');
          capsEl.innerHTML = '';
          return;
        }

        statusEl.innerHTML = '<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-green-900/30 text-green-400">connected</span>';
        errorEl.innerHTML = '';
        capsEl.classList.remove('hidden');
        if (!capsEl.dataset.loadedFor || capsEl.dataset.loadedFor !== s.name) {
          capsEl.dataset.loadedFor = s.name;
          capsEl.innerHTML = '<span class="text-xs text-slate-500">Loading capabilities...</span>';
          loadCaps(s.name, 'caps-' + i);
        }
      });

      return hasLoadingServers;
    }

    function updateWsBridgeStatuses(wsList) {
      for (const ws of wsList) {
        const statusEl = document.getElementById('wsbridge-status-' + ws.name);
        const capsEl = document.getElementById('wsb-caps-' + ws.name);
        if (!statusEl || !capsEl) continue;

        statusEl.innerHTML = '<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-green-900/30 text-green-400">connected</span>';
        capsEl.classList.remove('hidden');
        if (!capsEl.dataset.loadedFor || capsEl.dataset.loadedFor !== ws.name) {
          capsEl.dataset.loadedFor = ws.name;
          capsEl.innerHTML = '<span class="text-xs text-slate-500">Loading capabilities...</span>';
          loadCaps(ws.name, 'wsb-caps-' + ws.name);
        }
      }
    }

    function setButtonLoading(btn, loading, originalText) {
      if (loading) {
        btn.disabled = true;
        btn.dataset.originalText = btn.innerHTML;
        btn.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-white/40 border-t-cyan-400 rounded-full animate-[spin_0.6s_linear_infinite] mr-1 align-middle"></span>' + originalText;
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.originalText || originalText;
      }
    }

    function resetSaveButton() {
      const saveBtn = document.getElementById('saveBtn');
      setButtonLoading(saveBtn, false, 'Save');
      saveBtn.disabled = false;
    }

    async function toggleServer(index, checkbox) {
      checkbox.disabled = true;
      try {
        const res = await fetch('/api/servers/' + index + '/toggle', { method: 'PATCH' });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          checkbox.checked = !checkbox.checked; // revert
        }
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        checkbox.checked = !checkbox.checked;
        checkbox.disabled = false;
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadCaps(serverName, elId) {
      const el = document.getElementById(elId);
      if (!el) return;
      try {
        const res = await fetch('/api/servers/' + encodeURIComponent(serverName) + '/capabilities');
        if (!res.ok) { el.innerHTML = ''; return; }
        const caps = await res.json();
        let html = '';
        if (caps.tools && caps.tools.length > 0) {
          html += '<div class="mb-2"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Tools (' + caps.tools.length + ')</div><div class="flex flex-wrap gap-1">' +
            caps.tools.map(t => '<span class="inline-block px-2 py-0.5 rounded text-xs font-mono bg-cyan-900/30 text-cyan-400 border border-cyan-800" title="' + escHtml(t.description) + '">' + escHtml(t.name) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.resources && caps.resources.length > 0) {
          html += '<div class="mb-2"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Resources (' + caps.resources.length + ')</div><div class="flex flex-wrap gap-1">' +
            caps.resources.map(r => '<span class="inline-block px-2 py-0.5 rounded text-xs font-mono bg-amber-900/30 text-amber-400 border border-amber-800" title="' + escHtml(r.description) + '">' + escHtml(r.uri) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.resourceTemplates && caps.resourceTemplates.length > 0) {
          html += '<div class="mb-2"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Resource Templates (' + caps.resourceTemplates.length + ')</div><div class="flex flex-wrap gap-1">' +
            caps.resourceTemplates.map(r => '<span class="inline-block px-2 py-0.5 rounded text-xs font-mono bg-purple-900/30 text-purple-400 border border-purple-800" title="' + escHtml(r.description) + '">' + escHtml(r.uriTemplate) + '</span>').join('') +
          '</div></div>';
        }
        if (caps.prompts && caps.prompts.length > 0) {
          html += '<div class="mb-2"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Prompts (' + caps.prompts.length + ')</div><div class="flex flex-wrap gap-1">' +
            caps.prompts.map(p => '<span class="inline-block px-2 py-0.5 rounded text-xs font-mono bg-green-900/30 text-green-400 border border-green-800" title="' + escHtml(p.description) + '">' + escHtml(p.name) + '</span>').join('') +
          '</div></div>';
        }
        el.innerHTML = html || '<span class="text-xs text-slate-500">No capabilities found</span>';
      } catch(e) {
        el.innerHTML = '';
      }
    }

    function buildProbeConfig() {
      const type = document.getElementById('serverType').value;
      const cfg = { name: '__probe__' };
      if (type === 'http') {
        cfg.url = document.getElementById('serverUrl').value;
        const h = document.getElementById('serverHeaders').value.trim();
        if (h) { try { cfg.httpHeaders = JSON.parse(h); } catch(_) {} }
      } else {
        cfg.command = document.getElementById('serverCommand').value;
        const a = document.getElementById('serverArgs').value.trim();
        if (a) { try { cfg.args = JSON.parse(a); } catch(_) {} }
        const e = document.getElementById('serverEnv').value.trim();
        if (e) { try { cfg.env = JSON.parse(e); } catch(_) {} }
      }
      return cfg;
    }

    async function probeAndShowTools() {
      const sec = document.getElementById('probeSection');
      const content = document.getElementById('probeContent');
      sec.classList.remove('hidden');

      const cfg = buildProbeConfig();
      content.innerHTML = '<div class="text-amber-400 text-xs">Connecting to server...</div>';
      try {
        const res = await fetch('/api/probe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        });
        const data = await res.json();
        if (!res.ok) {
          content.innerHTML = '<div class="text-red-400 text-xs bg-red-900/30 px-2.5 py-1.5 rounded">Error: ' + escHtml(data.error || 'Unknown error') + '</div>';
          return;
        }
        renderProbeResults(data);
      } catch(e) {
        content.innerHTML = '<div class="text-red-400 text-xs bg-red-900/30 px-2.5 py-1.5 rounded">Error: ' + escHtml(e.message) + '</div>';
      }
    }

    function renderProbeResults(data) {
      const content = document.getElementById('probeContent');
      let html = '<h4 class="text-xs text-slate-400 mb-2">Select capabilities to enable (all checked by default):</h4>';

      if (data.tools && data.tools.length > 0) {
        html += '<div class="mb-2.5"><div class="text-xs font-semibold text-slate-400 uppercase mb-1">Tools (' + data.tools.length + ')</div>';
        data.tools.forEach(t => {
          html += '<div class="flex items-start gap-1.5 py-0.5">' +
            '<input type="checkbox" class="probe-tool-cb mt-0.5 shrink-0" value="' + escHtml(t.name) + '" checked>' +
            '<div><div class="font-mono text-xs text-slate-200">' + escHtml(t.name) + '</div>' +
            (t.description ? '<div class="text-xs text-slate-500">' + escHtml(t.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.resources && data.resources.length > 0) {
        html += '<div class="mb-2.5"><div class="text-xs font-semibold text-slate-400 uppercase mb-1">Resources (' + data.resources.length + ')</div>';
        data.resources.forEach(r => {
          html += '<div class="flex items-start gap-1.5 py-0.5">' +
            '<input type="checkbox" class="probe-resource-cb mt-0.5 shrink-0" value="' + escHtml(r.uri) + '" checked>' +
            '<div><div class="font-mono text-xs text-slate-200">' + escHtml(r.uri) + '</div>' +
            (r.description ? '<div class="text-xs text-slate-500">' + escHtml(r.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.resourceTemplates && data.resourceTemplates.length > 0) {
        html += '<div class="mb-2.5"><div class="text-xs font-semibold text-slate-400 uppercase mb-1">Resource Templates (' + data.resourceTemplates.length + ')</div>';
        data.resourceTemplates.forEach(r => {
          html += '<div class="flex items-start gap-1.5 py-0.5">' +
            '<input type="checkbox" class="probe-template-cb mt-0.5 shrink-0" value="' + escHtml(r.uriTemplate) + '" checked>' +
            '<div><div class="font-mono text-xs text-slate-200">' + escHtml(r.uriTemplate) + '</div>' +
            (r.description ? '<div class="text-xs text-slate-500">' + escHtml(r.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (data.prompts && data.prompts.length > 0) {
        html += '<div class="mb-2.5"><div class="text-xs font-semibold text-slate-400 uppercase mb-1">Prompts (' + data.prompts.length + ')</div>';
        data.prompts.forEach(p => {
          html += '<div class="flex items-start gap-1.5 py-0.5">' +
            '<input type="checkbox" class="probe-prompt-cb mt-0.5 shrink-0" value="' + escHtml(p.name) + '" checked>' +
            '<div><div class="font-mono text-xs text-slate-200">' + escHtml(p.name) + '</div>' +
            (p.description ? '<div class="text-xs text-slate-500">' + escHtml(p.description) + '</div>' : '') +
            '</div></div>';
        });
        html += '</div>';
      }

      if (!data.tools?.length && !data.resources?.length && !data.resourceTemplates?.length && !data.prompts?.length) {
        html += '<div class="text-slate-500 text-xs">No capabilities found on this server.</div>';
      }

      content.innerHTML = html;

      // Sync tool checkboxes -> enabledTools input
      content.querySelectorAll('.probe-tool-cb').forEach(cb => {
        cb.addEventListener('change', syncEnabledTools);
      });
      syncEnabledTools();
    }

    function syncEnabledTools() {
      const cbs = document.querySelectorAll('.probe-tool-cb');
      if (!cbs.length) return;
      const all = Array.from(cbs);
      const checked = all.filter(c => c.checked).map(c => c.value);
      // If all checked, leave empty (means "all enabled")
      document.getElementById('enabledTools').value = checked.length === all.length ? '' : checked.join(', ');
    }

    function openAddModal() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = 'Add Server';
      document.getElementById('serverForm').reset();
      document.getElementById('probeSection').classList.add('hidden');
      document.getElementById('probeContent').innerHTML = '';
      resetSaveButton();
      document.getElementById('modal').classList.remove('hidden');
      toggleTypeFields();
    }

    async function editServer(index) {
      const res = await fetch('/api/servers');
      const servers = await res.json();
      const server = servers[index];
      editingIndex = index;

      document.getElementById('modalTitle').textContent = 'Edit Server';
      document.getElementById('serverName').value = server.name;
      document.getElementById('serverType').value = server.url ? 'http' : 'stdio';

      if (server.url) {
        document.getElementById('serverUrl').value = server.url;
        document.getElementById('serverHeaders').value = server.httpHeaders ? JSON.stringify(server.httpHeaders, null, 2) : '';
      } else {
        document.getElementById('serverCommand').value = server.command || '';
        document.getElementById('serverArgs').value = server.args ? JSON.stringify(server.args) : '';
        document.getElementById('serverEnv').value = server.env ? JSON.stringify(server.env, null, 2) : '';
      }

      document.getElementById('enabledTools').value = server.enabledTools ? server.enabledTools.join(', ') : '';
      document.getElementById('probeSection').classList.add('hidden');
      document.getElementById('probeContent').innerHTML = '';
      resetSaveButton();
      document.getElementById('modal').classList.remove('hidden');
      toggleTypeFields();
    }

    async function deleteServer(index) {
      if (!confirm('Are you sure you want to delete this server?')) return;
      const btn = document.getElementById('delete-btn-' + index);
      setButtonLoading(btn, true, 'Deleting...');
      try {
        const res = await fetch('/api/servers/' + index, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          setButtonLoading(btn, false, 'Delete');
          return;
        }
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        setButtonLoading(btn, false, 'Delete');
      }
    }

    async function saveServer(e) {
      e.preventDefault();
      const name = document.getElementById('serverName').value;
      const type = document.getElementById('serverType').value;
      const enabledTools = document.getElementById('enabledTools').value
        .split(',').map(t => t.trim()).filter(t => t);

      const server = { name };
      if (enabledTools.length > 0) server.enabledTools = enabledTools;

      // Collect enabled resources/templates/prompts from probe checkboxes if visible
      const resourceCbs = document.querySelectorAll('.probe-resource-cb');
      if (resourceCbs.length) {
        const all = Array.from(resourceCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledResources = checked;
      }
      const templateCbs = document.querySelectorAll('.probe-template-cb');
      if (templateCbs.length) {
        const all = Array.from(templateCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledResourceTemplates = checked;
      }
      const promptCbs = document.querySelectorAll('.probe-prompt-cb');
      if (promptCbs.length) {
        const all = Array.from(promptCbs);
        const checked = all.filter(c => c.checked).map(c => c.value);
        if (checked.length < all.length) server.enabledPrompts = checked;
      }

      if (type === 'http') {
        server.url = document.getElementById('serverUrl').value;
        const headers = document.getElementById('serverHeaders').value.trim();
        if (headers) {
          try { server.httpHeaders = JSON.parse(headers); }
          catch(_) { alert('Invalid JSON for HTTP headers'); return; }
        }
      } else {
        server.command = document.getElementById('serverCommand').value;
        const args = document.getElementById('serverArgs').value.trim();
        if (args) {
          try { server.args = JSON.parse(args); }
          catch(_) { alert('Invalid JSON for arguments'); return; }
        }
        const env = document.getElementById('serverEnv').value.trim();
        if (env) {
          try { server.env = JSON.parse(env); }
          catch(_) { alert('Invalid JSON for environment variables'); return; }
        }
      }

      const method = editingIndex >= 0 ? 'PUT' : 'POST';
      const url = editingIndex >= 0 ? '/api/servers/' + editingIndex : '/api/servers';

      const saveBtn = document.getElementById('saveBtn');
      setButtonLoading(saveBtn, true, 'Saving...');
      saveBtn.disabled = true;

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(server)
        });
        if (!res.ok) {
          const data = await res.json();
          alert('Error: ' + (data.error || 'Unknown error'));
          resetSaveButton();
          return;
        }
        resetSaveButton();
        closeModal();
        await loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
        resetSaveButton();
      }
    }

    function closeModal() {
      resetSaveButton();
      document.getElementById('modal').classList.add('hidden');
    }

    function toggleTypeFields() {
      const type = document.getElementById('serverType').value;
      document.getElementById('httpFields').classList.toggle('hidden', type !== 'http');
      document.getElementById('stdioFields').classList.toggle('hidden', type !== 'stdio');
    }

    // ===== Profile Functions =====

    async function loadProfiles() {
      try {
        const res = await fetch('/api/profiles');
        const data = await res.json();
        currentProfiles = data.profiles || [];
        currentActiveProfile = data.active;
        renderProfileBar();
      } catch(e) {
        console.error('Failed to load profiles:', e);
      }
    }

    function renderProfileBar() {
      const sel = document.getElementById('profileSelect');
      const curVal = sel.value;
      sel.innerHTML = '<option value="">(None)</option>';
      currentProfiles.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name + ' (' + p.servers.length + ' servers)';
        if (p.name === currentActiveProfile) opt.selected = true;
        sel.appendChild(opt);
      });

      const btnActivate = document.getElementById('btnActivateProfile');
      const btnDeactivate = document.getElementById('btnDeactivateProfile');
      btnActivate.disabled = !sel.value || sel.value === currentActiveProfile;
      btnDeactivate.classList.toggle('hidden', !currentActiveProfile);
    }

    function onProfileSelectChange() {
      const sel = document.getElementById('profileSelect');
      document.getElementById('btnActivateProfile').disabled = !sel.value || sel.value === currentActiveProfile;
    }

    async function activateSelectedProfile() {
      const name = document.getElementById('profileSelect').value;
      if (!name) return;
      try {
        const res = await fetch('/api/profiles/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
        currentActiveProfile = name;
        renderProfileBar();
        loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    async function deactivateCurrentProfile() {
      try {
        const res = await fetch('/api/profiles/deactivate', { method: 'POST' });
        if (!res.ok) { const data = await res.json(); alert('Error: ' + (data.error || '')); return; }
        currentActiveProfile = null;
        renderProfileBar();
        loadServers();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    async function openProfileModal(editName) {
      editingProfileName = editName || null;
      document.getElementById('profileModalTitle').textContent = editName ? 'Edit Profile' : 'Create Profile';
      document.getElementById('profileName').value = editName || '';

      // Fetch servers for checkboxes
      const serversRes = await fetch('/api/servers');
      const servers = await serversRes.json();
      allServerNamesCache = servers.map(s => s.name);

      // Get current servers if editing
      let checkedServers = [];
      if (editName) {
        const profile = currentProfiles.find(p => p.name === editName);
        if (profile) checkedServers = profile.servers;
      }

      const container = document.getElementById('profileServerCheckboxes');
      if (servers.length === 0) {
        container.innerHTML = '<div class="text-slate-500 text-xs p-2">No servers configured. Add servers first.</div>';
      } else {
        container.innerHTML = servers.map(s => {
          const checked = checkedServers.includes(s.name) ? 'checked' : '';
          const enabled = s.enabled !== false;
          return '<div class="flex items-start gap-1.5 py-1.5">' +
            '<input type="checkbox" class="profile-srv-cb mt-0.5 shrink-0" value="' + escHtml(s.name) + '" ' + checked + '>' +
            '<div><div class="font-mono text-xs text-slate-200">' + escHtml(s.name) + '</div>' +
            '<div class="text-xs text-slate-500">' + (enabled ? '' : '<span class="text-red-400">disabled</span> · ') + (s.url ? 'HTTP' : 'STDIO') + '</div></div></div>';
        }).join('');
      }

      document.getElementById('profileModal').classList.remove('hidden');
    }

    function closeProfileModal() {
      document.getElementById('profileModal').classList.add('hidden');
    }

    async function saveProfile(e) {
      e.preventDefault();
      const name = document.getElementById('profileName').value.trim();
      if (!name) { alert('Profile name is required'); return; }

      const checkedServers = Array.from(document.querySelectorAll('.profile-srv-cb:checked')).map(cb => cb.value);

      if (editingProfileName) {
        try {
          const res = await fetch('/api/profiles/' + encodeURIComponent(editingProfileName), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, servers: checkedServers })
          });
          const data = await res.json();
          if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
          closeProfileModal();
          await loadProfiles();
          if (!document.getElementById('profileManagerModal').classList.contains('hidden')) {
            renderProfileManager();
          }
        } catch(e) { alert('Error: ' + e.message); }
      } else {
        try {
          const res = await fetch('/api/profiles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, servers: checkedServers })
          });
          const data = await res.json();
          if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }
          closeProfileModal();
          await loadProfiles();
        } catch(e) { alert('Error: ' + e.message); }
      }
    }

    async function openProfileManager() {
      document.getElementById('profileManagerModal').classList.remove('hidden');
      renderProfileManager();
    }

    function closeProfileManager() {
      document.getElementById('profileManagerModal').classList.add('hidden');
    }

    function renderProfileManager() {
      const container = document.getElementById('profileList');
      if (currentProfiles.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 p-8">No profiles created yet. Click "+ New Profile" to create one.</div>';
        return;
      }

      container.innerHTML = currentProfiles.map(p => {
        const isActive = p.name === currentActiveProfile;
        const escaped = escHtml(p.name);
        return '<div class="bg-slate-800 border border-slate-700 rounded-lg p-3.5 mb-2.5 flex justify-between items-center relative overflow-hidden' + (isActive ? ' border-green-400' : '') + '" data-profile="' + escaped + '">' +
          '<div class="absolute top-0 left-0 right-0 h-[3px] ' + (isActive ? 'bg-gradient-to-r from-green-400 to-green-700' : 'bg-gradient-to-r from-cyan-400 to-cyan-700') + '"></div>' +
          '<div class="flex-1">' +
            '<div class="font-semibold text-[15px] text-white">' + escaped + (isActive ? ' <span class="inline-block px-2.5 py-0.5 bg-green-900/30 text-green-400 rounded text-[11px] font-semibold">ACTIVE</span>' : '') + '</div>' +
            '<div class="text-xs text-slate-500 mt-0.5">' + (p.servers.length > 0 ? p.servers.map(s => '<span class="inline-block px-1.5 py-[1px] bg-cyan-900/30 text-cyan-400 rounded mx-0.5 text-[11px]">' + escHtml(s) + '</span>').join('') : '<span class="text-red-400">No servers</span>') + '</div>' +
          '</div>' +
          '<div class="flex gap-2 flex-wrap">' +
            (!isActive ? '<button class="px-2.5 py-1 rounded text-[11px] border cursor-pointer transition-colors bg-slate-800 text-green-400 border-slate-700 hover:bg-slate-700 hover:border-green-400" data-action="activate">Activate</button>' : '') +
            '<button class="px-2.5 py-1 rounded text-[11px] border cursor-pointer transition-colors bg-slate-800 text-cyan-400 border-slate-700 hover:bg-slate-700 hover:border-cyan-400" data-action="edit">Edit</button>' +
            '<button class="px-2.5 py-1 rounded text-[11px] border cursor-pointer transition-colors bg-slate-800 text-red-400 border-slate-700 hover:bg-slate-700 hover:border-red-400" data-action="delete">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('');

      // Wire up event delegation for profile manager buttons
      container.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const item = btn.closest('[data-profile]');
          if (!item) return;
          const name = item.dataset.profile;
          if (btn.dataset.action === 'activate') activateProfileFromManager(name);
          else if (btn.dataset.action === 'edit') editProfileFromManager(name);
          else if (btn.dataset.action === 'delete') deleteProfileFromManager(name);
        });
      });
    }

    function escAttr(str) {
      return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    async function activateProfileFromManager(name) {
      try {
        const res = await fetch('/api/profiles/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!res.ok) { alert('Error: ' + (data.error || '')); return; }
        currentActiveProfile = name;
        renderProfileBar();
        renderProfileManager();
        loadServers();
      } catch(e) { alert('Error: ' + e.message); }
    }

    function editProfileFromManager(name) {
      closeProfileManager();
      openProfileModal(name);
    }

    async function deleteProfileFromManager(name) {
      if (!confirm('Delete profile "' + name + '"?')) return;
      try {
        const res = await fetch('/api/profiles/' + encodeURIComponent(name), { method: 'DELETE' });
        if (!res.ok) { const data = await res.json(); alert('Error: ' + (data.error || '')); return; }
        await loadProfiles();
        renderProfileManager();
      } catch(e) { alert('Error: ' + e.message); }
    }

    // ===== Init =====
    loadProfiles();
    loadServers();

    // ===== Backup Functions =====

    function exportBackup() {
      window.location.href = '/api/backup/export';
    }

    async function importBackup(input) {
      const file = input.files[0];
      if (!file) return;

      if (!confirm('Importing a backup will OVERWRITE your current config and stats data. Are you sure?')) {
        input.value = '';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/api/backup/import', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) {
          alert('Import failed: ' + (data.error || 'Unknown error'));
          input.value = '';
          return;
        }
        const parts = [];
        if (data.config) parts.push('config');
        if (data.stats) parts.push('stats database');
        alert('Backup imported successfully! Restored: ' + parts.join(', ') + '. Page will reload.');
        window.location.reload();
      } catch(e) {
        alert('Import failed: ' + e.message);
      }
      input.value = '';
    }
  </script>
</body>
</html>
