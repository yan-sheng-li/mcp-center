<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Center - Statistics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1923; }
    ::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4a5a; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans">
  <div class="max-w-[1600px] mx-auto p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
      <h1 class="text-2xl font-semibold text-white flex items-center gap-2.5">
        <span class="text-[28px]">&#128202;</span> MCP Center Statistics
      </h1>
      <div class="flex items-center gap-3 flex-wrap">
        <select id="periodSelect" onchange="refreshAll()" class="px-3.5 py-1.5 rounded text-xs border border-slate-700 bg-slate-800 text-slate-200 cursor-pointer transition-colors hover:border-cyan-400 focus:outline-none focus:border-cyan-400">
          <option value="1h">Last 1 Hour</option>
          <option value="6h">Last 6 Hours</option>
          <option value="24h" selected>Last 24 Hours</option>
          <option value="7d">Last 7 Days</option>
          <option value="30d">Last 30 Days</option>
        </select>
        <div class="flex items-center gap-1.5 text-xs text-slate-400">
          <label class="flex items-center gap-1.5 cursor-pointer">
            <label class="relative inline-block w-9 h-5 cursor-pointer">
              <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()" class="peer sr-only">
              <span class="absolute inset-0 bg-slate-700 rounded-full transition-colors peer-checked:bg-cyan-700"></span>
              <span class="absolute top-[3px] left-[3px] w-[14px] h-[14px] bg-slate-400 rounded-full transition-all peer-checked:translate-x-4 peer-checked:bg-white"></span>
            </label>
            Auto-refresh
          </label>
        </div>
        <span class="text-xs text-slate-500" id="lastUpdated"></span>
        <a href="/ui" class="text-xs text-cyan-400 no-underline px-3.5 py-1.5 border border-slate-700 rounded transition-colors hover:bg-slate-800 hover:border-cyan-400">&larr; Server Management</a>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5 relative overflow-hidden" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#4fc3f7,#0288d1)"></div>
        <div class="text-xs text-slate-400 uppercase tracking-wider mb-2">Total Calls</div>
        <div class="text-[32px] font-bold leading-tight text-cyan-400" id="kpiTotalCalls">-</div>
        <div class="text-xs text-slate-500 mt-1.5" id="kpiCallsSub"></div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5 relative overflow-hidden" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#66bb6a,#2e7d32)"></div>
        <div class="text-xs text-slate-400 uppercase tracking-wider mb-2">Success Rate</div>
        <div class="text-[32px] font-bold leading-tight text-green-400" id="kpiSuccessRate">-</div>
        <div class="text-xs text-slate-500 mt-1.5" id="kpiSuccessSub"></div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5 relative overflow-hidden" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#ffa726,#ef6c00)"></div>
        <div class="text-xs text-slate-400 uppercase tracking-wider mb-2">Avg Duration</div>
        <div class="text-[32px] font-bold leading-tight text-amber-400" id="kpiAvgDuration">-</div>
        <div class="text-xs text-slate-500 mt-1.5" id="kpiDurationSub"></div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5 relative overflow-hidden" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <div class="absolute top-0 left-0 right-0 h-[3px]" style="background:linear-gradient(90deg,#ab47bc,#7b1fa2)"></div>
        <div class="text-xs text-slate-400 uppercase tracking-wider mb-2">Active Tools / Servers</div>
        <div class="text-[32px] font-bold leading-tight text-purple-400" id="kpiActiveTools">-</div>
        <div class="text-xs text-slate-500 mt-1.5" id="kpiToolsSub"></div>
      </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="grid grid-cols-1 lg:grid-cols-[3fr_2fr] gap-4 mb-6">
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <h3 class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wide">Call Timeline</h3>
        <div class="w-full h-80" id="timelineChart"></div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <h3 class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wide">Tool Usage Ranking</h3>
        <div class="w-full h-80" id="toolsChart"></div>
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <h3 class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wide">Call Type Distribution</h3>
        <div class="w-full h-80" id="typePieChart"></div>
      </div>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-5" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
        <h3 class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wide">Server Load</h3>
        <div class="w-full h-80" id="serverChart"></div>
      </div>
    </div>

    <!-- Recent Logs Table -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-5" style="background:linear-gradient(135deg,#1a2a3a 0%,#1e3345 100%)">
      <h3 class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wide flex justify-between items-center">
        Recent Calls <span id="logCount" class="text-xs text-slate-500 font-normal normal-case tracking-normal"></span>
      </h3>
      <div class="overflow-x-auto max-h-[420px] overflow-y-auto">
        <table class="w-full border-collapse text-xs">
          <thead class="sticky top-0 z-10">
            <tr>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Time</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Type</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Name</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Server</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Status</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Duration</th>
              <th class="bg-slate-900 text-slate-400 text-left px-3 py-2.5 font-medium uppercase text-[11px] tracking-wide border-b border-slate-700">Client IP</th>
            </tr>
          </thead>
          <tbody id="logTableBody">
            <tr><td colspan="7" class="text-center text-slate-500 py-10 text-sm">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ===== Chart instances =====
    let timelineChart, toolsChart, typePieChart, serverChart;
    let refreshTimer = null;
    const REFRESH_INTERVAL = 10000; // 10s

    // ===== ECharts theme colors =====
    const COLORS = ['#4fc3f7', '#66bb6a', '#ffa726', '#ef5350', '#ab47bc', '#26c6da', '#ffee58', '#8d6e73'];

    function initCharts() {
      const darkTheme = {
        backgroundColor: 'transparent',
        textStyle: { color: '#8a9bb5', fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif' },
        legend: { textStyle: { color: '#8a9bb5' } },
        tooltip: { backgroundColor: 'rgba(15,25,35,0.95)', borderColor: '#2a3a4a', textStyle: { color: '#e0e6ed', fontSize: 12 } },
      };

      timelineChart = echarts.init(document.getElementById('timelineChart'));
      toolsChart = echarts.init(document.getElementById('toolsChart'));
      typePieChart = echarts.init(document.getElementById('typePieChart'));
      serverChart = echarts.init(document.getElementById('serverChart'));

      // Apply base dark theme
      [timelineChart, toolsChart, typePieChart, serverChart].forEach(c => {
        c.setOption(darkTheme, true);
      });
    }

    function resizeCharts() {
      [timelineChart, toolsChart, typePieChart, serverChart].forEach(c => c && c.resize());
    }
    window.addEventListener('resize', resizeCharts);

    // ===== Data fetching =====
    function getPeriod() {
      return document.getElementById('periodSelect').value;
    }

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    // ===== Render functions =====

    function renderKPI(data) {
      document.getElementById('kpiTotalCalls').textContent = data.totalCalls.toLocaleString();
      document.getElementById('kpiSuccessRate').textContent = data.successRate + '%';
      document.getElementById('kpiAvgDuration').textContent = data.avgDuration.toLocaleString() + 'ms';
      document.getElementById('kpiActiveTools').textContent = data.activeTools + ' / ' + data.activeServers;

      document.getElementById('kpiCallsSub').textContent = 'API calls in selected period';
      const successCalls = Math.round(data.totalCalls * data.successRate / 100);
      const errorCalls = data.totalCalls - successCalls;
      document.getElementById('kpiSuccessSub').textContent = successCalls + ' success, ' + errorCalls + ' error';
      document.getElementById('kpiDurationSub').textContent = 'Average response time';
      document.getElementById('kpiToolsSub').textContent = 'Distinct tools / servers';
    }

    function renderTimeline(data) {
      if (!data || data.length === 0) {
        timelineChart.setOption({ title: { text: 'No data', left: 'center', top: 'center', textStyle: { color: '#5a6b7d', fontSize: 14 } } });
        return;
      }

      const xData = data.map(d => {
        const dt = new Date(d.timestamp);
        return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      });
      // Deduplicate x labels if many
      const xUnique = [];
      const seen = new Set();
      xData.forEach((v, i) => {
        if (!seen.has(v) || i === xData.length - 1) { xUnique.push(v); }
        else { xUnique.push(''); }
        seen.add(v);
      });

      timelineChart.setOption({
        title: undefined,
        tooltip: {
          trigger: 'axis',
          backgroundColor: 'rgba(15,25,35,0.95)',
          borderColor: '#2a3a4a',
          textStyle: { color: '#e0e6ed', fontSize: 12 },
          formatter: function(params) {
            if (!params || !params.length) return '';
            let html = '<div style="font-weight:600;margin-bottom:4px">' + params[0].axisValue + '</div>';
            params.forEach(p => {
              html += '<div style="display:flex;align-items:center;gap:6px;margin:2px 0">'
                + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + '"></span>'
                + p.seriesName + ': <b>' + p.value + '</b></div>';
            });
            return html;
          }
        },
        legend: { data: ['Success', 'Error'], top: 0, right: 0, textStyle: { color: '#8a9bb5', fontSize: 12 } },
        grid: { left: 50, right: 20, top: 36, bottom: 30 },
        xAxis: { type: 'category', data: xData, axisLine: { lineStyle: { color: '#2a3a4a' } }, axisLabel: { color: '#5a6b7d', fontSize: 11 }, axisTick: { show: false } },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#1a2a3a' } }, axisLabel: { color: '#5a6b7d', fontSize: 11 }, axisLine: { show: false } },
        series: [
          {
            name: 'Success',
            type: 'line',
            data: data.map(d => d.success),
            smooth: true,
            symbol: 'none',
            lineStyle: { width: 2, color: '#66bb6a' },
            areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(102,187,106,0.3)' }, { offset: 1, color: 'rgba(102,187,106,0.02)' }] } },
            itemStyle: { color: '#66bb6a' },
          },
          {
            name: 'Error',
            type: 'line',
            data: data.map(d => d.error),
            smooth: true,
            symbol: 'none',
            lineStyle: { width: 2, color: '#ef5350' },
            areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(239,83,80,0.3)' }, { offset: 1, color: 'rgba(239,83,80,0.02)' }] } },
            itemStyle: { color: '#ef5350' },
          }
        ]
      }, true);
    }

    function renderToolRanking(data) {
      const top10 = data.slice(0, 10);
      if (top10.length === 0) {
        toolsChart.setOption({ title: { text: 'No data', left: 'center', top: 'center', textStyle: { color: '#5a6b7d', fontSize: 14 } } });
        return;
      }

      const names = top10.map(d => {
        const n = d.name;
        return n.length > 28 ? n.substring(0, 26) + '...' : n;
      }).reverse();
      const values = top10.map(d => d.totalCalls).reverse();
      const successRates = top10.map(d => d.successRate).reverse();

      toolsChart.setOption({
        title: undefined,
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(15,25,35,0.95)',
          borderColor: '#2a3a4a',
          textStyle: { color: '#e0e6ed', fontSize: 12 },
          formatter: function(params) {
            const p = params[0];
            const item = top10[top10.length - 1 - p.dataIndex];
            return '<b>' + item.name + '</b><br/>'
              + 'Calls: ' + item.totalCalls + '<br/>'
              + 'Success: ' + item.successRate + '%<br/>'
              + 'Avg: ' + item.avgDuration + 'ms';
          }
        },
        grid: { left: 200, right: 60, top: 10, bottom: 20 },
        xAxis: { type: 'value', splitLine: { lineStyle: { color: '#1a2a3a' } }, axisLabel: { color: '#5a6b7d', fontSize: 11 }, axisLine: { show: false } },
        yAxis: { type: 'category', data: names, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#c0cdd9', fontSize: 11, width: 180, overflow: 'truncate' } },
        series: [{
          type: 'bar',
          data: values.map((v, i) => ({
            value: v,
            itemStyle: {
              color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: 'rgba(79,195,247,0.3)' }, { offset: 1, color: '#4fc3f7' }] },
              borderRadius: [0, 3, 3, 0],
            }
          })),
          barMaxWidth: 20,
          label: { show: true, position: 'right', color: '#8a9bb5', fontSize: 11, formatter: function(p) { return p.value; } },
        }]
      }, true);
    }

    function renderTypePie(data) {
      // Aggregate by type from tool stats
      const typeMap = {};
      (data || []).forEach(d => {
        typeMap[d.type] = (typeMap[d.type] || 0) + d.totalCalls;
      });

      const pieData = Object.entries(typeMap).map(([type, value], i) => ({
        name: type.charAt(0).toUpperCase() + type.slice(1),
        value: value,
        itemStyle: { color: COLORS[i % COLORS.length] }
      }));

      if (pieData.length === 0) {
        typePieChart.setOption({ title: { text: 'No data', left: 'center', top: 'center', textStyle: { color: '#5a6b7d', fontSize: 14 } } });
        return;
      }

      typePieChart.setOption({
        title: undefined,
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(15,25,35,0.95)',
          borderColor: '#2a3a4a',
          textStyle: { color: '#e0e6ed', fontSize: 12 },
          formatter: '{b}: {c} ({d}%)'
        },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          center: ['50%', '55%'],
          avoidLabelOverlap: true,
          itemStyle: { borderColor: '#1a2a3a', borderWidth: 2, borderRadius: 4 },
          label: { color: '#c0cdd9', fontSize: 12 },
          labelLine: { lineStyle: { color: '#2a3a4a' } },
          emphasis: {
            label: { fontSize: 14, fontWeight: 'bold' },
            itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.3)' }
          },
          data: pieData,
        }]
      }, true);
    }

    function renderServerLoad(data) {
      // Aggregate by server from tool stats
      const serverMap = {};
      (data || []).forEach(d => {
        const name = d.serverName || 'Unknown';
        if (!serverMap[name]) serverMap[name] = { calls: 0, success: 0 };
        serverMap[name].calls += d.totalCalls;
        serverMap[name].success += d.successCount;
      });

      const entries = Object.entries(serverMap).sort((a, b) => b[1].calls - a[1].calls).slice(0, 8);

      if (entries.length === 0) {
        serverChart.setOption({ title: { text: 'No data', left: 'center', top: 'center', textStyle: { color: '#5a6b7d', fontSize: 14 } } });
        return;
      }

      const names = entries.map(e => e[0]);
      const calls = entries.map(e => e[1].calls);
      const success = entries.map(e => e[1].success);
      const errors = entries.map(e => e[1].calls - e[1].success);

      serverChart.setOption({
        title: undefined,
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(15,25,35,0.95)',
          borderColor: '#2a3a4a',
          textStyle: { color: '#e0e6ed', fontSize: 12 },
        },
        legend: { data: ['Success', 'Error'], top: 0, right: 0, textStyle: { color: '#8a9bb5', fontSize: 12 } },
        grid: { left: 16, right: 16, top: 36, bottom: 16, containLabel: true },
        xAxis: { type: 'category', data: names, axisLine: { lineStyle: { color: '#2a3a4a' } }, axisLabel: { color: '#c0cdd9', fontSize: 11, rotate: names.some(n => n.length > 10) ? 20 : 0 }, axisTick: { show: false } },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#1a2a3a' } }, axisLabel: { color: '#5a6b7d', fontSize: 11 }, axisLine: { show: false } },
        series: [
          {
            name: 'Success',
            type: 'bar',
            stack: 'total',
            data: success,
            itemStyle: { color: '#66bb6a', borderRadius: [0, 0, 0, 0] },
            barMaxWidth: 40,
          },
          {
            name: 'Error',
            type: 'bar',
            stack: 'total',
            data: errors,
            itemStyle: { color: '#ef5350', borderRadius: [3, 3, 0, 0] },
            barMaxWidth: 40,
          }
        ]
      }, true);
    }

    function renderRecentLogs(data) {
      const tbody = document.getElementById('logTableBody');
      document.getElementById('logCount').textContent = data.length > 0 ? '(latest ' + data.length + ')' : '';

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-slate-500 py-10 text-sm">No call records yet. Start using MCP tools to see activity here.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(row => {
        const time = new Date(row.timestamp).toLocaleString();
        const statusClass = row.status === 'success' ? 'text-green-400 font-semibold' : 'text-red-400 font-semibold';
        const duration = row.durationMs != null ? row.durationMs + 'ms' : '-';
        const errorInfo = row.errorMsg ? ' title="' + escAttr(row.errorMsg) + '"' : '';
        const name = row.name || '-';
        const server = row.serverName || '-';
        const ip = row.clientIp || '-';

        return '<tr' + errorInfo + ' class="hover:bg-cyan-900/5">'
          + '<td class="px-3 py-2.5 border-b border-slate-800 font-mono text-xs text-slate-300">' + escHtml(time) + '</td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800"><span class="inline-block px-2 py-0.5 rounded text-[11px] font-medium ' + (row.type === 'tool' ? 'bg-cyan-900/30 text-cyan-400' : row.type === 'resource' ? 'bg-amber-900/30 text-amber-400' : 'bg-purple-900/30 text-purple-400') + '">' + escHtml(row.type) + '</span></td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800 font-mono text-xs text-slate-300" title="' + escAttr(name) + '">' + escHtml(truncate(name, 40)) + '</td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800 text-xs text-slate-300">' + escHtml(server) + '</td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800 ' + statusClass + '">' + escHtml(row.status) + '</td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800 font-mono text-xs text-slate-300">' + duration + '</td>'
          + '<td class="px-3 py-2.5 border-b border-slate-800 font-mono text-xs text-slate-300">' + escHtml(ip) + '</td>'
          + '</tr>';
      }).join('');
    }

    // ===== Helpers =====
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function truncate(str, len) {
      return str.length > len ? str.substring(0, len - 2) + '..' : str;
    }

    function getTimelineGranularity(period) {
      if (period === '1h') return '5m';
      if (period === '6h') return '15m';
      if (period === '24h') return '1h';
      if (period === '7d') return '6h';
      return '1d';
    }

    // ===== Refresh all =====
    async function refreshAll() {
      const period = getPeriod();
      const granularity = getTimelineGranularity(period);

      try {
        const [overview, tools, timeline, recent] = await Promise.all([
          fetchJSON('/api/stats/overview?period=' + period),
          fetchJSON('/api/stats/tools?period=' + period),
          fetchJSON('/api/stats/timeline?period=' + period + '&granularity=' + granularity),
          fetchJSON('/api/stats/recent?limit=50'),
        ]);

        renderKPI(overview);
        renderTimeline(timeline);
        renderToolRanking(tools);
        renderTypePie(tools);
        renderServerLoad(tools);
        renderRecentLogs(recent);

        document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch (err) {
        console.error('Failed to refresh dashboard:', err);
      }
    }

    // ===== Auto refresh =====
    function toggleAutoRefresh() {
      const checked = document.getElementById('autoRefresh').checked;
      if (checked) {
        refreshTimer = setInterval(refreshAll, REFRESH_INTERVAL);
      } else {
        if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      }
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      initCharts();
      refreshAll();
      refreshTimer = setInterval(refreshAll, REFRESH_INTERVAL);
    });
  </script>
</body>
</html>
