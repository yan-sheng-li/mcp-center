# ============================================
# MCP Center - Docker Compose
# ============================================

services:
  mcp-center:
    build: .
    container_name: mcp-center
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persist config and stats database
      - mcp-data:/root/.mcp-center
    environment:
      - PORT=3000
      - STATS_RETENTION_DAYS=30
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/servers/status"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  mcp-data:
    driver: local
